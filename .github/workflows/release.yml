name: Release logo bundle

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Git LFS and fetch crest binaries
        run: |
          git lfs install
          git lfs pull

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install build dependencies
        run: npm ci

      - name: Resolve semver from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build bundle
        run: npm run build-bundle -- --version "${{ steps.ver.outputs.version }}"

      - name: Verify bundle artifacts exist
        run: |
          test -f dist/manifest.json
          test -n "$(ls dist/logos-bundle-*.zip 2>/dev/null)"
          test -n "$(ls dist/logos-bundle-*.zip.sha256 2>/dev/null)"
          node -e "const m=require('./dist/manifest.json'); if(m.file_count<1) process.exit(1)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/manifest.json
            dist/logos-bundle-*.zip
            dist/logos-bundle-*.zip.sha256
          generate_release_notes: true
